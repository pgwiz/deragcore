version: '3.9'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: ragcore-postgres
    environment:
      POSTGRES_USER: ragcore
      POSTGRES_PASSWORD: ragcore
      POSTGRES_DB: ragcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragcore -d ragcore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragcore

  redis:
    image: redis:7-alpine
    container_name: ragcore-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragcore

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragcore-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ragcore:ragcore@postgres:5432/ragcore
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ragcore:/app/ragcore
    command: uvicorn ragcore.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ragcore

volumes:
  postgres_data:
  redis_data:

networks:
  ragcore:
    driver: bridge
